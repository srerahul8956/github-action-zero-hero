# This is workflow name
name: Hello

# runs on a trigger
on:
    workflow_dispatch: 

# these are jobs inside workflow
jobs:

# this is name of the job
    greet:
        runs-on: ubuntu-latest    
        steps:
            - name: say hello to users
              run: echo "Hello Dosto"

            - name: say hello to username
              run: echo "Hello $USER"

    details:
        runs-on: ubuntu-latest
        steps:
          - name: show what is the version of docker and python
            run: docker --version && python --version
            
          


